name: Android Release

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/android-release.yml"
      - "app/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - "gradle/**"
      - "README.md"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  changelog:
    if: ${{ github.ref_name == github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.changelog.outputs.version }}
      body: ${{ steps.changelog.outputs.clean_changelog }}
      tag: ${{ steps.changelog.outputs.tag }}
      skipped: ${{ steps.changelog.outputs.skipped }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          skip-version-file: "true"
          output-file: "false"
          skip-commit: "true"
          skip-on-empty: "true"
          tag-prefix: "v"

  release:
    needs: changelog
    if: ${{ needs.changelog.outputs.skipped == 'false' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Export release version metadata
        shell: bash
        run: |
          VERSION_NAME="${{ needs.changelog.outputs.version }}"
          if [[ ! "${VERSION_NAME}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)([-+].*)?$ ]]; then
            echo "Version '${VERSION_NAME}' is not valid SemVer" >&2
            exit 1
          fi

          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"
          VERSION_CODE=$((10#$MAJOR * 10000 + 10#$MINOR * 100 + 10#$PATCH))

          echo "VERSION_NAME=${VERSION_NAME}" >> "${GITHUB_ENV}"
          echo "VERSION_CODE=${VERSION_CODE}" >> "${GITHUB_ENV}"
          echo "APK_NAME=cloud-media-provider-proxy-${VERSION_NAME}.apk" >> "${GITHUB_ENV}"

      - name: Prepare release keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" ]]; then
            echo "ANDROID_KEYSTORE_BASE64 is not configured" >&2
            exit 1
          fi

          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/release.keystore"
          echo "RELEASE_STORE_FILE=${RUNNER_TEMP}/release.keystore" >> "${GITHUB_ENV}"
          echo "RELEASE_STORE_PASSWORD=${ANDROID_KEYSTORE_PASSWORD}" >> "${GITHUB_ENV}"
          echo "RELEASE_KEY_ALIAS=${ANDROID_KEY_ALIAS}" >> "${GITHUB_ENV}"
          echo "RELEASE_KEY_PASSWORD=${ANDROID_KEY_PASSWORD}" >> "${GITHUB_ENV}"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Tag HEAD
        shell: bash
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${{ needs.changelog.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ needs.changelog.outputs.tag }} already exists"
          else
            git tag "${{ needs.changelog.outputs.tag }}"
          fi

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename release artifact
        shell: bash
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [[ ! -f "${APK_PATH}" ]]; then
            APK_PATH="app/build/outputs/apk/release/app-release-unsigned.apk"
          fi
          cp "${APK_PATH}" "app/build/outputs/apk/release/${APK_NAME}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.APK_NAME }}
          path: app/build/outputs/apk/release/${{ env.APK_NAME }}

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.changelog.outputs.tag }}
          body: ${{ needs.changelog.outputs.body }}
          fail_on_unmatched_files: true
          token: ${{ github.token }}
          files: app/build/outputs/apk/release/${{ env.APK_NAME }}
